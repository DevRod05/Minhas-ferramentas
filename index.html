      var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 620px;
  }
  .logo-header {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .logo-header img {
    height: 88px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    color: #ffffff;
    text-align: center;
  }
  p.subtitle {
    font-size: 14px;
    color: #cfe0f5;
    margin: 0 0 24px;
    text-align: center;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea {
    resize: vertical;
    min-height: 130px;
    line-height: 1.5;
  }
  button {
    width: 100%;
    padding: 12px;
    background: var(--gold);
    color: #012a5d;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #e6cf10; }
  button:active { transform: scale(0.99); }
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .add-row input {
    flex: 1;
  }
  .btn-adicionar {
    width: auto;
    padding: 0 18px;
    white-space: nowrap;
  }
  #lista-atividades {
    list-style: none;
    margin: 0 0 4px;
    padding: 0;
  }
  #lista-atividades li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: #faf9f5;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 6px;
  }
  #lista-atividades li span {
    flex: 1;
  }
  .btn-remover {
    width: auto;
    padding: 2px 9px;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    color: #a32d2d;
    border: 1px solid #a32d2d;
    border-radius: 6px;
  }
  .btn-remover:hover { background: #fcebeb; }
  .lista-vazia {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 2px 12px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 18px 0 0;
  }
  .checkbox-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
  }
  .checkbox-row label {
    margin: 0;
    font-size: 14px;
    color: var(--text);
  }
  #hora-extra-wrap {
    display: none;
    margin-top: 10px;
  }
  .saida-wrap { display: none; }
  .saida-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .saida-header span {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .btn-copiar {
    width: auto;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-copiar:hover { background: #eef3fa; }
  pre#saida {
    white-space: pre-wrap;
    background: #faf9f5;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    margin: 0;
  }
</style>
</head>

  <h1>Relatório diário de atividades</h1>
  <p class="subtitle">Preencha os dados e gere o texto do relatório do dia.</p>

  <div class="card">
    <div class="row">
      <div>
        <label for="data">Data</label>
        <input type="date" id="data">
      </div>
      <div>
        <label for="colaborador">Colaborador</label>
        <input type="text" id="colaborador" value="Rodrigo">
      </div>
    </div>

    <label for="nova-atividade">Atividades realizadas</label>
    <div class="add-row">
      <input type="text" id="nova-atividade" placeholder="Ex: Atendimento aos clientes na loja">
      <button class="btn-adicionar" id="adicionar">Adicionar atividade</button>
    </div>

    <ul id="lista-atividades"></ul>
    <p class="lista-vazia" id="lista-vazia">Nenhuma atividade adicionada ainda.</p>

    <div class="checkbox-row">
      <input type="checkbox" id="houve-hora-extra">
      <label for="houve-hora-extra">Houve hora extra hoje</label>
    </div>
    <div id="hora-extra-wrap">
      <label for="hora-extra-desc">Descreva a hora extra</label>
      <textarea id="hora-extra-desc" style="min-height:70px" placeholder="Ex: 1h30 extra para finalizar o fechamento do caixa"></textarea>
    </div>

    <br>
    <button id="gerar">Gerar relatório</button>
  </div>

  <div class="card saida-wrap" id="saida-wrap">
    <div class="saida-header">
      <span>Relatório gerado</span>
      <button class="btn-copiar" id="copiar">Copiar</button>
    </div>
    <pre id="saida"></pre>
  </div>
</div>

<script>
  const dataInput = document.getElementById('data');
  const hoje = new Date();
  dataInput.value = hoje.toISOString().slice(0, 10);

  function formatarDataExtenso(iso) {
    const [ano, mes, dia] = iso.split('-').map(Number);
    const d = new Date(ano, mes - 1, dia);
    const dias = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
    return {
      texto: `${dia.toString().padStart(2, '0')}/${mes.toString().padStart(2, '0')}/${ano} (${dias[d.getDay()]})`,
      ehSabado: d.getDay() === 6
    };
  }

  let atividades = [];
  const listaEl = document.getElementById('lista-atividades');
  const listaVaziaEl = document.getElementById('lista-vazia');
  const novaAtividadeInput = document.getElementById('nova-atividade');

  function renderizarLista() {
    listaEl.innerHTML = '';
    listaVaziaEl.style.display = atividades.length ? 'none' : 'block';
    atividades.forEach((atividade, i) => {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.textContent = atividade;
      const btnRemover = document.createElement('button');
      btnRemover.textContent = 'Remover';
      btnRemover.className = 'btn-remover';
      btnRemover.addEventListener('click', () => {
        atividades.splice(i, 1);
        renderizarLista();
      });
      li.appendChild(span);
      li.appendChild(btnRemover);
      listaEl.appendChild(li);
    });
  }

  function adicionarAtividade() {
    const texto = novaAtividadeInput.value.trim();
    if (!texto) return;
    atividades.push(texto);
    novaAtividadeInput.value = '';
    novaAtividadeInput.focus();
    renderizarLista();
  }

  document.getElementById('adicionar').addEventListener('click', adicionarAtividade);
  novaAtividadeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      adicionarAtividade();
    }
  });

  document.getElementById('houve-hora-extra').addEventListener('change', (e) => {
    document.getElementById('hora-extra-wrap').style.display = e.target.checked ? 'block' : 'none';
  });

  document.getElementById('gerar').addEventListener('click', () => {
    const iso = dataInput.value;
    if (!iso) { alert('Selecione uma data.'); return; }

    const colaborador = document.getElementById('colaborador').value.trim() || 'Rodrigo';
    const { texto: dataExtenso, ehSabado } = formatarDataExtenso(iso);

    const listaAtividades = atividades.length
      ? atividades.map(a => `- ${a}`).join('\n')
      : '- (nenhuma atividade informada)';

    let horario;
    if (ehSabado) {
      horario = `Horário de entrada: 08h\nHorário de saída: 12h aos sábados\n(sem horário de almoço no sábado)`;
    } else {
      horario = `Horário de entrada: 08h\nHorário de saída: 17h\n(02h de almoço)`;
    }

    const houveHoraExtra = document.getElementById('houve-hora-extra').checked;
    const descHoraExtra = document.getElementById('hora-extra-desc').value.trim();
    const blocoHoraExtra = houveHoraExtra
      ? `\nHora extra: ${descHoraExtra || 'sim (sem descrição informada)'}`
      : '';

    const relatorio = `RELATÓRIO DIÁRIO DE ATIVIDADES: ${dataExtenso}
Colaborador: ${colaborador}
${horario}${blocoHoraExtra}
Atividades realizadas:
${listaAtividades}`;

    document.getElementById('saida').textContent = relatorio;
    document.getElementById('saida-wrap').style.display = 'block';
  });

  document.getElementById('copiar').addEventListener('click', () => {
    const texto = document.getElementById('saida').textContent;
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.getElementById('copiar');
      const original = btn.textContent;
      btn.textContent = 'Copiado!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
